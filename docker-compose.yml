services:
  postgres:
    image: postgis/postgis:16-3.4
    # postgis/postgis is published only for linux/amd64; pin so we use the
    # amd64 image deterministically (Rosetta will emulate on Apple Silicon).
    platform: linux/amd64
    environment:
      POSTGRES_DB: eudr
      POSTGRES_USER: eudr
      POSTGRES_PASSWORD: eudr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # No host port published — other containers reach it on the docker
    # network as `postgres:5432`. Use `make psql` to connect from host.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eudr -d eudr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    # No host port published — internal only.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    # Host ports shifted to 91xx to avoid clashing with other local stacks.
    ports:
      - "9100:9000"
      - "9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/eudr-documents || true;
      mc mb -p local/eudr-dds-payloads || true;
      mc mb -p local/eudr-rasters || true;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./secrets:/run/secrets:ro
    # Shifted to 8800 — port 8000 is commonly used by other services.
    ports:
      - "8800:8000"
    command: >
      uvicorn eudr.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./secrets:/run/secrets:ro
    command: >
      celery -A eudr.workers.celery_app worker --loglevel=INFO --concurrency=4

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: >
      celery -A eudr.workers.celery_app beat --loglevel=INFO

volumes:
  postgres-data:
  redis-data:
  minio-data:
