name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: eudr_test
          POSTGRES_USER: eudr
          POSTGRES_PASSWORD: eudr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U eudr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://eudr:eudr@localhost:5432/eudr_test
      DATABASE_URL_SYNC: postgresql://eudr:eudr@localhost:5432/eudr_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: test-secret-key
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps for rasterio/GDAL
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev gdal-bin
      - run: pip install -e ".[dev]"
      - name: Generate ephemeral JWT keys
        run: |
          mkdir -p secrets
          openssl genrsa -out secrets/jwt-private.pem 2048
          openssl rsa -in secrets/jwt-private.pem -pubout -out secrets/jwt-public.pem
          echo "JWT_PRIVATE_KEY_PATH=$PWD/secrets/jwt-private.pem" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY_PATH=$PWD/secrets/jwt-public.pem" >> "$GITHUB_ENV"
      - run: alembic upgrade head
      - run: pytest -ra --cov=eudr --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: eudr-traceability:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
